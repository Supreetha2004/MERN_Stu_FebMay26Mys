<!DOCTYPE html>
<html>
<head>
<title>FAQ Builder</title>
<style>
.faq-box{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
}

.badge{
    background:green;
    color:white;
    padding:3px 6px;
    margin-left:5px;
    font-size:12px;
}

.error{
    color:red;
}
</style>
</head>

<body>

<h2>FAQ Builder</h2>

<input type="text" id="question" placeholder="Enter Question"><br><br>

<textarea id="answer" placeholder="Enter Answer"></textarea><br><br>

<button id="addFAQ">Add FAQ</button>

<p id="message" class="error"></p>

<hr>

<div id="faqContainer">
<p id="noFaq">No FAQs available</p>
</div>

<script src="script.js"></script>

</body>
</html>
