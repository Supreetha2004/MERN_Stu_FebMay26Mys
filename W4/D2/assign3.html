<!DOCTYPE html>
<html>
<head>
<title>Feedback Manager</title>

<style>
.card{
border:1px solid #ccc;
padding:10px;
margin:10px 0;
}

.label{
background:#444;
color:white;
padding:3px 6px;
font-size:12px;
margin-left:5px;
}

.error{
color:red;
}

#count{
font-weight:bold;
}
</style>

</head>

<body>

<h2>Feedback Form</h2>

<input type="text" id="name" placeholder="Enter Name"><br><br>

<input type="email" id="email" placeholder="Enter Email"><br><br>

<select id="type">
<option value="">Select Feedback Type</option>
<option value="Bug">Bug</option>
<option value="Suggestion">Suggestion</option>
<option value="Appreciation">Appreciation</option>
</select><br><br>

<textarea id="feedback" placeholder="Enter Feedback"></textarea><br><br>

<button id="submitBtn">Submit Feedback</button>

<p class="error" id="message"></p>

<hr>

<h3>Total Feedback: <span id="count">0</span></h3>

<div id="feedbackContainer"></div>

<script src="script.js"></script>

</body>
</html>
